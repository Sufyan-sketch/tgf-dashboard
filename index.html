<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TGF Dashboard · Talview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Bricolage Grotesque',sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #e6e5de;border-radius:14px;padding:40px 44px;width:100%;max-width:400px;box-shadow:0 4px 32px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-mark{width:32px;height:32px;border-radius:7px;background:#1a1916;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px}
.logo-text{font-size:16px;font-weight:800;color:#1a1916;letter-spacing:-.01em}
h1{font-size:22px;font-weight:700;color:#1a1916;letter-spacing:-.01em;margin-bottom:6px}
p{font-size:13px;color:#6a6960;line-height:1.5;margin-bottom:28px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9a9990;margin-bottom:8px}
.input-wrap{position:relative;margin-bottom:10px}
input[type=password]{width:100%;padding:12px 44px 12px 14px;border:1px solid #e6e5de;border-radius:8px;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;color:#1a1916;background:#fff;transition:border-color .15s;outline:none}
input[type=password]:focus{border-color:#1a1916}
input[type=password].error{border-color:#c73333;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9a9990;padding:4px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.eye-btn:hover{color:#1a1916}
.err-msg{font-size:12px;color:#c73333;margin-bottom:14px;min-height:18px;display:none}
.err-msg.show{display:block}
button.submit{width:100%;padding:12px;border-radius:8px;background:#1a1916;border:none;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;letter-spacing:.01em}
button.submit:hover{background:#3a3935}
button.submit:active{transform:scale(.99)}
.footer{margin-top:28px;padding-top:20px;border-top:1px solid #f2f1ec;font-size:11px;color:#c8c7c0;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M8 3v10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-text">TGF Command</div>
  </div>
  <h1>Weekly Review</h1>
  <p>Enter your access password to view the TGF dashboard. Contact your coordinator if you don't have access.</p>
  <label for="pwd">Password</label>
  <div class="input-wrap">
    <input type="password" id="pwd" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')unlock()">
    <button class="eye-btn" onclick="toggleEye()" id="eyebtn" title="Show/hide password">
      <svg id="eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <svg id="eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>
  <div class="err-msg" id="errmsg">Incorrect password. Please try again.</div>
  <button class="submit" onclick="unlock()">Access Dashboard</button>
  <div class="footer">Talview · TGF Weekly Review · Thursday 1:05 PM IST</div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// PASSWORD CONFIGURATION
// To change password: open browser console and run:
//   crypto.subtle.digest('SHA-256', new TextEncoder().encode('YourPassword'))
//     .then(b=>console.log([...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')))
// Then replace PG_HASH below with the output.
// ─────────────────────────────────────────────────────────
const PG_HASH = '787fc8c31b847419ab7243c30d0d7234496acde11f12641dfa560bfb19eba0c0'; // Talview@TGF2026
const SESSION_HOURS = 12;
const PG_KEY = 'tgf_auth_v1';

// ─────────────────────────────────────────────────────────
// DO NOT EDIT BELOW THIS LINE
// ─────────────────────────────────────────────────────────
async function hashStr(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}

function checkSession() {
  try {
    const raw = localStorage.getItem(PG_KEY);
    if (!raw) return false;
    const {hash, exp} = JSON.parse(raw);
    return hash === PG_HASH && Date.now() < exp;
  } catch(e) { return false; }
}

async function unlock() {
  const input = document.getElementById('pwd');
  const err = document.getElementById('errmsg');
  const btn = document.querySelector('button[onclick]') || document.querySelector('button');
  if(btn){btn.disabled=true;}
  const h = await hashStr(input.value);
  if (h === PG_HASH) {
    const exp = Date.now() + SESSION_HOURS * 3600000;
    localStorage.setItem(PG_KEY, JSON.stringify({hash: PG_HASH, exp}));
    window.location.href = 'dashboard.html';
  } else {
    input.classList.add('error');
    err.classList.add('show');
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 400);
    input.focus();
  }
  if(btn){btn.disabled=false;}
}

function toggleEye() {
  const input = document.getElementById('pwd');
  const show = document.getElementById('eye-show');
  const hide = document.getElementById('eye-hide');
  if (input.type === 'password') {
    input.type = 'text';
    show.style.display = 'none';
    hide.style.display = 'block';
  } else {
    input.type = 'password';
    show.style.display = 'block';
    hide.style.display = 'none';
  }
}

// Auto-redirect if session is still valid
if (checkSession()) window.location.href = 'dashboard.html';
</script>
</body>
</html>
